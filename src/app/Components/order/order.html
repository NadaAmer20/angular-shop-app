<div class="container mt-4">
    <div class="row mb-4 bg-light p-3 border rounded shadow-sm">
        <div class="col-md-6 offset-md-3">
            <label class="fw-bold mb-2">اختار القسم:</label>
            <select class="form-select border-primary" [(ngModel)]="selectedCatId">
                <option *ngFor="let cat of categories" [ngValue]="cat.id">{{cat.name}}</option>
            </select>
        </div>
    </div>

    <hr>

    <app-products [childSelectedCatId]="selectedCatId" (onTotalPriceChanged)="updateTotalPrice($event)">
    </app-products>

    <div class="row mt-5 justify-content-center">
        <div class="col-md-8">
            <div class="card bg-primary text-white border-0 shadow"
                style="border-radius: 20px; background: linear-gradient(45deg, #0d6efd, #0dcaf0);">
                <div class="card-body d-flex justify-content-between align-items-center p-4">
                    <div>
                        <h5 class="mb-1 opacity-75">إجمالي قيمة طلبك الآن</h5>
                        <h2 class="mb-0 fw-bold">{{totalOrderPrice}} <span class="fs-5">جنيه مصري</span></h2>
                    </div>
                    <div class="bg-white text-primary rounded-pill px-4 py-2 fw-bold shadow-sm">
                        🛒 السلة
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<input type="text" #userNameInp/>
