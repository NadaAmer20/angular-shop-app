<div class="container mt-4">

  <div class="row mb-4 bg-light p-3 border rounded shadow-sm">
    <div class="col-md-6 mb-2">
      <label class="fw-bold mb-1">تصفية حسب القسم:</label>
      <select class="form-select border-primary" [(ngModel)]="childSelectedCatId" (change)="loadProducts()">
        <option *ngFor="let cat of categories" [ngValue]="cat.id">{{cat.name}}</option>
      </select>
    </div>
    <div class="col-md-6 mb-2">
      <label class="fw-bold mb-1">ابحث عن منتج:</label>
      <input type="text" class="form-control border-primary" [(ngModel)]="searchQuery" placeholder="اكتب اسم المنتج...">
    </div>
  </div>

  <div class="row">
    @if (isLoading) {
      <div class="col-12 text-center my-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">جاري تحميل المنتجات...</p>
      </div>
    }

    <div class="col-md-4 mb-4" *ngFor="let prd of filteredProducts">

      <div class="card h-100 shadow-sm" [ngClass]="{'out-of-stock': prd.quantity == 0}">

        <img [src]="prd.imgUrl" class="card-img-top p-2" style="height: 200px; object-fit: contain;"
          (click)="goToDetails(prd.id)">

        <div class="card-body text-center">
          <h5 class="card-title">{{prd.name}}</h5>

          <p class="fw-bold" [ngStyle]="{'color': prd.price > 40000 ? 'red' : 'green'}">
            السعر: {{prd.price}} جنيه
          </p>

          <p class="text-muted">الكمية المتاحة: {{prd.quantity}}</p>

          <input type="number" #countInp class="form-control mb-2 text-center" value="1">

          <div class="d-flex justify-content-center gap-2 mt-3">
            <button class="btn btn-secondary btn-sm" (click)="goToDetails(prd.id)">
              التفاصيل
            </button>
            <button class="btn btn-warning btn-sm" (click)="editProduct(prd.id)">
              تعديل
            </button>
            <button class="btn btn-danger btn-sm" (click)="deleteProduct(prd.id)">
              حذف
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>
