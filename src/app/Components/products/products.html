<div class="container mt-4">
  
  <div class="row mb-4 bg-light p-3 border rounded">
    <div class="col-md-6 mb-2">
      <label class="fw-bold">ابحث عن منتج:</label>
      <input type="text" class="form-control" [(ngModel)]="searchQuery" placeholder="اكتب اسم المنتج...">
    </div>
    
    <div class="col-md-6 mb-2">
      <label class="fw-bold">اختار القسم:</label>
      <select class="form-select" [(ngModel)]="SelectedCatId">
        <option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</option>
      </select>
    </div>
  </div>

  <div class="row mb-5 justify-content-center">
    <div class="col-md-8">
      <div class="card bg-primary text-white border-0 shadow" style="border-radius: 20px; background: linear-gradient(45deg, #0d6efd, #0dcaf0);">
        <div class="card-body d-flex justify-content-between align-items-center p-4">
          <div>
            <h5 class="mb-1 opacity-75">إجمالي قيمة طلبك الآن</h5>
            <h2 class="mb-0 fw-bold">{{totalOrderPrice}} <span class="fs-5">جنيه مصري</span></h2>
          </div>
          <div class="bg-white text-primary rounded-pill px-4 py-2 fw-bold shadow-sm">
            🛒 السلة
          </div>
        </div>
      </div>
    </div>
  </div>


  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let prd of filteredProducts">
      
      <div class="card h-100 shadow-sm" [ngClass]="{'out-of-stock': prd.quantity == 0}">
        
        <img [src]="prd.imgUrl" class="card-img-top p-2" style="height: 200px; object-fit: contain;">
        
        <div class="card-body text-center">
          <h5 class="card-title">{{prd.name}}</h5>
          
          <p class="fw-bold" [ngStyle]="{'color': prd.price > 40000 ? 'red' : 'green'}">
            السعر: {{prd.price}} جنيه
          </p>

          <p class="text-muted">الكمية المتاحة: {{prd.quantity}}</p>
          
          <input type="number" #countInp class="form-control mb-2 text-center" value="1">
          
          <button class="btn btn-primary w-100" 
                  [disabled]="prd.quantity == 0"
                  (click)="buy(countInp.value, prd.price)">
            إضافة للسلة
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
